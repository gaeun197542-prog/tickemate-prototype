<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TickeMate AI — K-POP Ticket Assistant</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
/* ===========================================================
   TickeMate AI — dark navy theme
   =========================================================== */
:root {
  --bg-0: #070b1c;
  --bg-1: #0b1228;
  --surface: #111a38;
  --surface-2: #182447;
  --surface-3: #20305c;
  --border: rgba(140, 165, 230, 0.14);
  --border-strong: rgba(140, 165, 230, 0.28);

  --accent: #6ea8ff;
  --accent-2: #8ab6ff;
  --accent-deep: #3f74e0;
  --glow: rgba(79, 134, 255, 0.55);
  --pink: #ff6f9c;
  --pink-soft: rgba(255, 111, 156, 0.16);
  --mint: #4fd6c0;
  --gold: #ffce6e;

  --text: #eef2ff;
  --muted: #9aa6d0;
  --muted-2: #62709e;

  --radius: 18px;
  --radius-sm: 12px;
  --radius-lg: 26px;
  --shadow: 0 24px 60px -24px rgba(0, 0, 0, 0.7);
  --shadow-glow: 0 16px 50px -16px var(--glow);

  --font: "Pretendard", "Pretendard Variable", -apple-system, BlinkMacSystemFont,
    "Segoe UI", system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }

body {
  font-family: var(--font);
  background: var(--bg-0);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
  letter-spacing: -0.01em;
  word-break: keep-all;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input { font-family: inherit; }
::selection { background: rgba(110, 168, 255, 0.32); }

/* ---------- Animated aurora background ---------- */
.aurora {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  background:
    radial-gradient(120% 90% at 50% -10%, #142250 0%, var(--bg-1) 46%, var(--bg-0) 100%);
}
.aurora::before,
.aurora::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.55;
  mix-blend-mode: screen;
}
.aurora::before {
  width: 60vw; height: 60vw;
  left: -12vw; top: -18vw;
  background: radial-gradient(circle, #4f86ff 0%, transparent 65%);
  animation: drift1 22s ease-in-out infinite alternate;
}
.aurora::after {
  width: 55vw; height: 55vw;
  right: -14vw; bottom: -22vw;
  background: radial-gradient(circle, #b56cff 0%, transparent 65%);
  opacity: 0.4;
  animation: drift2 26s ease-in-out infinite alternate;
}
.aurora .blob3 {
  position: absolute;
  width: 40vw; height: 40vw;
  right: 12vw; top: 8vw;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.22;
  mix-blend-mode: screen;
  background: radial-gradient(circle, var(--pink) 0%, transparent 65%);
  animation: drift3 30s ease-in-out infinite alternate;
}
@keyframes drift1 { to { transform: translate(8vw, 10vh) scale(1.15); } }
@keyframes drift2 { to { transform: translate(-7vw, -8vh) scale(1.1); } }
@keyframes drift3 { to { transform: translate(-10vw, 6vh) scale(1.2); } }

.stars {
  position: absolute; inset: 0;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.7), transparent),
    radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.6), transparent),
    radial-gradient(1px 1px at 85% 25%, rgba(255,255,255,0.45), transparent),
    radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1px 1px at 10% 70%, rgba(255,255,255,0.4), transparent);
  animation: twinkle 6s ease-in-out infinite alternate;
}
@keyframes twinkle { from { opacity: 0.35; } to { opacity: 0.7; } }

/* ---------- App shell ---------- */
#root { position: relative; z-index: 1; }
.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.topbar {
  position: sticky; top: 0; z-index: 40;
  display: flex; align-items: center; gap: 22px;
  padding: 16px 30px;
  background: rgba(8, 12, 28, 0.72);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
}
.brand { display: flex; align-items: center; gap: 11px; flex-shrink: 0; }
.brand-mark {
  width: 34px; height: 34px; border-radius: 10px;
  display: grid; place-items: center;
  background: linear-gradient(135deg, var(--accent), var(--accent-deep));
  box-shadow: var(--shadow-glow);
  font-weight: 800; font-size: 17px; color: #06122e;
}
.brand-name { font-weight: 800; font-size: 18px; letter-spacing: -0.02em; }
.brand-name span { color: var(--accent); }
.topbar-spacer { flex: 1; }

/* progress in topbar */
.progress {
  display: flex; align-items: center; gap: 0;
  flex: 1; max-width: 720px;
}
.progress-step {
  display: flex; align-items: center; gap: 9px;
  flex: 1; min-width: 0;
}
.progress-dot {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  display: grid; place-items: center;
  font-size: 13px; font-weight: 700;
  background: var(--surface-2);
  border: 1.5px solid var(--border);
  color: var(--muted-2);
  transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.progress-step.done .progress-dot {
  background: linear-gradient(135deg, var(--accent), var(--accent-deep));
  border-color: transparent; color: #06122e;
}
.progress-step.active .progress-dot {
  background: var(--surface-3);
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 0 4px rgba(110, 168, 255, 0.14);
}
.progress-label {
  font-size: 12px; font-weight: 600; color: var(--muted-2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: color 0.3s;
}
.progress-step.active .progress-label { color: var(--text); }
.progress-step.done .progress-label { color: var(--muted); }
.progress-line {
  flex: 1; height: 2px; min-width: 12px;
  background: var(--border);
  margin: 0 4px;
  border-radius: 2px; overflow: hidden;
}
.progress-line i { display: block; height: 100%; width: 0; background: var(--accent); transition: width 0.5s ease; }
.progress-step.done + .progress-line i { width: 100%; }

@media (max-width: 1080px) { .progress-label { display: none; } }

/* language switcher (dropdown) */
.lang-dd { position: relative; flex-shrink: 0; }
.lang-dd-trigger {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 11px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); font-size: 13px; font-weight: 700;
  transition: all 0.2s;
}
.lang-dd-trigger:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface-2); }
.lang-dd-trigger.open { color: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 4px rgba(110,168,255,0.12); }
.lang-dd-label { min-width: 0; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lang-dd-trigger svg:first-child { color: var(--accent); flex-shrink: 0; }

.lang-dd-menu {
  position: absolute; top: calc(100% + 8px); right: 0; z-index: 60;
  width: 220px; max-height: 340px; overflow-y: auto;
  padding: 6px;
  background: rgba(13, 20, 44, 0.96);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border-strong);
  border-radius: 14px;
  box-shadow: 0 24px 60px -18px rgba(0,0,0,0.8);
  animation: ddIn 0.16s cubic-bezier(0.2, 0.9, 0.2, 1) both;
}
@keyframes ddIn { from { opacity: 0; transform: translateY(-6px); } }
.lang-dd-item {
  display: flex; align-items: center; gap: 11px; width: 100%;
  padding: 10px 11px; border-radius: 9px;
  font-size: 14px; font-weight: 600; color: var(--muted);
  transition: background 0.15s, color 0.15s;
}
.lang-dd-item:hover { background: var(--surface-2); color: var(--text); }
.lang-dd-item.active { color: var(--accent); background: rgba(110,168,255,0.08); }
.lang-dd-short {
  flex-shrink: 0; width: 30px; text-align: center;
  font-size: 11px; font-weight: 800; letter-spacing: 0.04em;
  color: var(--muted-2); font-family: ui-monospace, "SF Mono", Menlo, monospace;
}
.lang-dd-item.active .lang-dd-short { color: var(--accent); }
.lang-dd-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lang-dd-check { flex-shrink: 0; color: var(--accent); display: flex; }

@media (max-width: 1080px) { .lang-dd-label { display: none; } .lang-dd-trigger { padding: 8px 10px; } }

/* ---------- Main two-column ---------- */
.main {
  flex: 1;
  display: grid;
  grid-template-columns: minmax(330px, 400px) 1fr;
  gap: 0;
  max-width: 1320px; width: 100%;
  margin: 0 auto;
  align-items: stretch;
}
.copilot {
  position: relative;
  padding: 34px 30px 40px;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
}
.copilot-inner { position: sticky; top: 96px; }
.stage {
  padding: 34px 40px 60px;
  min-width: 0;
}
@media (max-width: 900px) {
  .main { grid-template-columns: 1fr; }
  .copilot { border-right: none; border-bottom: 1px solid var(--border); }
  .copilot-inner { position: static; }
}

/* ---------- AI co-pilot ---------- */
.ai-head { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
.ai-avatar {
  width: 46px; height: 46px; border-radius: 14px; flex-shrink: 0;
  display: grid; place-items: center; position: relative;
  background: linear-gradient(135deg, #1d2c5c, #0e1838);
  border: 1px solid var(--border-strong);
}
.ai-avatar .pulse {
  position: absolute; inset: 0; border-radius: 14px;
  box-shadow: 0 0 0 0 var(--glow); animation: pulse 2.6s ease-out infinite;
}
@keyframes pulse { to { box-shadow: 0 0 0 14px rgba(79,134,255,0); } }
.ai-avatar .orb {
  width: 18px; height: 18px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #cfe0ff, var(--accent) 60%, var(--accent-deep));
  box-shadow: 0 0 14px var(--glow);
}
.ai-meta .ai-name { font-weight: 800; font-size: 15px; }
.ai-meta .ai-status { font-size: 12px; color: var(--mint); display: flex; align-items: center; gap: 5px; }
.ai-meta .ai-status::before { content:""; width:6px;height:6px;border-radius:50%;background:var(--mint); box-shadow:0 0 8px var(--mint); }

.ai-thread { display: flex; flex-direction: column; gap: 14px; }
.ai-bubble {
  background: linear-gradient(180deg, var(--surface-2), var(--surface));
  border: 1px solid var(--border);
  border-radius: 4px 18px 18px 18px;
  padding: 15px 17px;
  font-size: 14.5px; line-height: 1.62; color: #dce4ff;
  box-shadow: 0 10px 30px -18px rgba(0,0,0,0.8);
  animation: bubbleIn 0.45s cubic-bezier(0.2, 0.9, 0.2, 1) both;
  position: relative;
}
.ai-bubble.dim { opacity: 0.5; }
.ai-bubble strong { color: var(--accent-2); font-weight: 700; }
.ai-bubble .cursor {
  display: inline-block; width: 7px; height: 1.05em; vertical-align: -2px;
  margin-left: 1px; background: var(--accent); border-radius: 1px;
  animation: blink 1s steps(2) infinite;
}
@keyframes blink { 50% { opacity: 0; } }
@keyframes bubbleIn { from { opacity: 0; transform: translateY(8px); } }

.ai-tip {
  margin-top: 18px; padding: 13px 15px;
  background: rgba(110, 168, 255, 0.07);
  border: 1px dashed var(--border-strong);
  border-radius: 14px; font-size: 12.5px; color: var(--muted); line-height: 1.55;
  display: flex; gap: 10px;
}
.ai-tip b { color: var(--accent-2); }

/* ---------- Stage common ---------- */
.stage-head { margin-bottom: 24px; animation: bubbleIn 0.5s both; }
.stage-eyebrow { font-size: 12px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 9px; }
.stage-title { font-size: 30px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.12; }
.stage-sub { margin-top: 9px; color: var(--muted); font-size: 15px; line-height: 1.55; max-width: 60ch; }

/* card / panel */
.panel {
  background: linear-gradient(180deg, rgba(24,36,71,0.7), rgba(17,26,56,0.7));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 9px;
  padding: 14px 26px; border-radius: 13px;
  font-size: 15px; font-weight: 700; letter-spacing: -0.01em;
  transition: transform 0.15s, box-shadow 0.25s, background 0.2s, opacity 0.2s;
  white-space: nowrap;
}
.btn:active { transform: translateY(1px) scale(0.99); }
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent-deep));
  color: #06122e;
  box-shadow: 0 14px 34px -12px var(--glow);
}
.btn-primary:hover { box-shadow: 0 18px 44px -10px var(--glow); transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; transform: none; }
.btn-ghost { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface-3); border-color: var(--border-strong); }
.btn-lg { padding: 16px 32px; font-size: 16px; }
.btn-block { width: 100%; }

.stage-actions { display: flex; gap: 12px; margin-top: 28px; align-items: center; }

/* inputs */
.field { display: flex; flex-direction: column; gap: 8px; }
.field label { font-size: 13px; font-weight: 600; color: var(--muted); }
.input {
  width: 100%; padding: 14px 16px; border-radius: 12px;
  background: var(--bg-1); border: 1.5px solid var(--border);
  color: var(--text); font-size: 15px; transition: border 0.2s, box-shadow 0.2s;
}
.input::placeholder { color: var(--muted-2); }
.input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(110,168,255,0.12); }

/* utility */
.row { display: flex; gap: 14px; }
.fade-in { animation: bubbleIn 0.5s both; }
.shimmer-img {
  background:
    repeating-linear-gradient(135deg, rgba(110,168,255,0.06) 0 10px, rgba(110,168,255,0.02) 10px 20px),
    var(--surface);
  display: grid; place-items: center; color: var(--muted-2);
  font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; letter-spacing: 0.05em;
  border: 1px solid var(--border);
}
.scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
.scrollbar::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 8px; }
.scrollbar::-webkit-scrollbar-track { background: transparent; }

/* ---------- Reduced-motion safeguard: never trap content at opacity:0 ---------- */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-delay: 0ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
  }
}

/* ===========================================================
   TickeMate AI — component styles
   =========================================================== */

/* ---- topbar extras ---- */
.topbar-tag { font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: 0.01em; }
.topbar-back {
  width: 38px; height: 38px; border-radius: 11px; flex-shrink: 0;
  display: grid; place-items: center; color: var(--muted);
  background: var(--surface); border: 1px solid var(--border); transition: all 0.2s;
}
.topbar-back:hover { color: var(--text); background: var(--surface-2); border-color: var(--border-strong); }

/* =================== INTRO =================== */
.intro-main { flex: 1; display: grid; place-items: center; padding: 40px 24px 80px; }
.intro { max-width: 620px; text-align: center; }
@media (prefers-reduced-motion: no-preference) {
  .intro > * { opacity: 0; transform: translateY(16px); }
  .intro.in > * { animation: introUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
}
.intro.in .intro-eyebrow { animation-delay: 0.15s; }
.intro.in .intro-title { animation-delay: 0.25s; }
.intro.in .intro-sub { animation-delay: 0.37s; }
.intro.in .intro-bullets { animation-delay: 0.5s; }
.intro.in .intro-cta { animation-delay: 0.66s; }
.intro.in .intro-note { animation-delay: 0.78s; }
@keyframes introUp { to { opacity: 1; transform: none; } }

.intro-orb { width: 96px; height: 96px; margin: 0 auto 30px; position: relative; display: grid; place-items: center; opacity: 1 !important; transform: none !important; }
.intro-orb .orb-core {
  width: 56px; height: 56px; border-radius: 50%;
  background: radial-gradient(circle at 34% 30%, #dfeaff, var(--accent) 55%, var(--accent-deep));
  box-shadow: 0 0 40px var(--glow), inset -6px -8px 16px rgba(7,18,46,0.5);
  animation: float 4s ease-in-out infinite;
}
.intro-orb .pulse { position: absolute; inset: 18px; border-radius: 50%; border: 1.5px solid var(--accent); opacity: 0; animation: ringOut 2.8s ease-out infinite; }
.intro-orb .pulse.p2 { animation-delay: 1.4s; }
@keyframes ringOut { 0% { transform: scale(0.7); opacity: 0.6; } 100% { transform: scale(2.1); opacity: 0; } }
@keyframes float { 50% { transform: translateY(-8px); } }

.intro-eyebrow { font-size: 13px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
.intro-title { font-size: clamp(34px, 5vw, 54px); font-weight: 800; line-height: 1.08; letter-spacing: -0.035em; white-space: pre-line; background: linear-gradient(180deg, #fff, #b9caf5); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.intro-sub { margin: 20px auto 0; max-width: 50ch; color: var(--muted); font-size: 16px; line-height: 1.65; }
.intro-bullets { display: flex; gap: 10px; justify-content: center; margin: 30px 0 34px; flex-wrap: wrap; }
.intro-bullet { display: flex; align-items: center; gap: 9px; padding: 10px 16px; border-radius: 100px; background: var(--surface); border: 1px solid var(--border); font-size: 13.5px; font-weight: 600; color: #d6deff; }
.ib-icon { color: var(--accent); display: grid; place-items: center; }
.intro-cta { margin: 0 auto; }
.intro-note { margin-top: 18px; font-size: 12.5px; color: var(--muted-2); }

/* =================== STEP 1 · CONCERT =================== */
.concert-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.concert-card {
  text-align: left; border-radius: var(--radius); overflow: hidden;
  background: var(--surface); border: 1.5px solid var(--border);
  transition: transform 0.2s, border 0.2s, box-shadow 0.25s; position: relative;
}
.concert-card:hover { transform: translateY(-3px); border-color: var(--border-strong); box-shadow: var(--shadow); }
.concert-card.active { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(110,168,255,0.18), var(--shadow-glow); }
.cc-poster { height: 130px; position: relative; display: grid; place-items: end start; padding: 16px; overflow: hidden; }
.cc-poster::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 30%, rgba(7,11,28,0.55)); }
.cc-artist { position: relative; z-index: 1; font-size: 24px; font-weight: 800; letter-spacing: -0.02em; color: #fff; text-shadow: 0 2px 14px rgba(0,0,0,0.4); }
.cc-hot { position: absolute; top: 12px; left: 12px; z-index: 1; font-size: 10.5px; font-weight: 800; letter-spacing: 0.08em; padding: 4px 9px; border-radius: 100px; background: rgba(7,11,28,0.5); color: #fff; backdrop-filter: blur(6px); }
.cc-check { position: absolute; top: 12px; right: 12px; z-index: 1; width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center; background: var(--accent); color: #06122e; opacity: 0; transform: scale(0.5); transition: all 0.25s; }
.concert-card.active .cc-check { opacity: 1; transform: none; }
.cc-body { padding: 15px 16px 16px; }
.cc-tour { font-size: 12px; font-weight: 700; letter-spacing: 0.05em; color: var(--accent-2); margin-bottom: 11px; }
.cc-meta { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--muted); margin-top: 6px; }
.cc-meta svg { color: var(--muted-2); flex-shrink: 0; }
.cc-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; padding-top: 14px; border-top: 1px solid var(--border); }
.cc-price { font-size: 16px; font-weight: 800; }
.cc-price em { font-style: normal; font-size: 11px; font-weight: 600; color: var(--muted-2); margin-right: 3px; }
.cc-pill { font-size: 12px; font-weight: 700; padding: 6px 13px; border-radius: 100px; background: var(--surface-3); color: var(--muted); transition: all 0.2s; }
.concert-card.active .cc-pill { background: var(--accent); color: #06122e; }

/* =================== STEP 2 · ACCOUNT =================== */
.acct-card { max-width: 460px; padding: 26px 26px 28px; }
.acct-dots { display: flex; align-items: center; gap: 8px; justify-content: center; margin-bottom: 24px; }
.acct-dot { width: 38px; height: 38px; border-radius: 12px; display: grid; place-items: center; background: var(--bg-1); border: 1.5px solid var(--border); color: var(--muted-2); transition: all 0.3s; }
.acct-dot.active { border-color: var(--accent); color: var(--accent); background: var(--surface-3); box-shadow: 0 0 0 4px rgba(110,168,255,0.12); }
.acct-dot.done { background: linear-gradient(135deg, var(--accent), var(--accent-deep)); border-color: transparent; color: #06122e; }
.acct-body { text-align: center; animation: bubbleIn 0.4s both; }
.acct-ico { width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 16px; display: grid; place-items: center; background: var(--surface-3); color: var(--accent); }
.acct-title { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
.acct-sub { font-size: 13.5px; color: var(--muted); margin-top: 6px; margin-bottom: 20px; line-height: 1.5; }
.acct-input-wrap { position: relative; }
.code-input { text-align: center; letter-spacing: 0.5em; font-size: 22px; font-weight: 700; }
.auto-chip { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; color: var(--accent); background: rgba(110,168,255,0.14); padding: 5px 9px; border-radius: 8px; animation: bubbleIn 0.4s both; }
.auto-chip.sm { padding: 5px; }
.link-btn { display: inline-flex; align-items: center; gap: 6px; margin: 12px auto 0; font-size: 12.5px; font-weight: 600; color: var(--muted); }
.link-btn:hover { color: var(--accent); }
.acct-done { text-align: center; padding: 8px 0; }
.success-badge { width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 18px; display: grid; place-items: center; color: #06122e; background: linear-gradient(135deg, var(--mint), #3fb89f); box-shadow: 0 0 0 6px rgba(79,214,192,0.14); animation: pop 0.5s cubic-bezier(0.2, 1.4, 0.4, 1) both; }
@keyframes pop { from { transform: scale(0.3); opacity: 0; } }
.acct-rows { margin-top: 20px; display: flex; flex-direction: column; gap: 1px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
.acct-rows div { display: flex; justify-content: space-between; padding: 13px 15px; background: var(--bg-1); font-size: 14px; }
.acct-rows div span { color: var(--muted-2); }
.acct-rows div b { font-weight: 600; }
.step-mini { font-size: 13px; color: var(--muted-2); font-weight: 600; }

/* =================== STEP 2 · READINESS CHECKLIST =================== */
.s2-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
.s2-tab { display: flex; align-items: center; gap: 9px; padding: 12px 14px; border-radius: 13px; background: var(--surface); border: 1.5px solid var(--border); color: var(--muted); transition: all 0.2s; text-align: left; min-width: 0; }
.s2-tab:hover { border-color: var(--border-strong); color: var(--text); }
.s2-tab.active { border-color: var(--accent); background: var(--surface-3); color: var(--text); box-shadow: 0 0 0 3px rgba(110,168,255,0.12); }
.s2-tab-ico { width: 28px; height: 28px; flex-shrink: 0; border-radius: 9px; display: grid; place-items: center; background: var(--bg-1); color: var(--accent); transition: all 0.2s; }
.s2-tab.done .s2-tab-ico { background: linear-gradient(135deg, var(--mint), #3fb89f); color: #06122e; }
.s2-tab.active .s2-tab-ico { background: var(--accent); color: #06122e; }
.s2-tab.active.done .s2-tab-ico { background: linear-gradient(135deg, var(--mint), #3fb89f); }
.s2-tab-label { font-size: 13.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
@media (max-width: 720px) { .s2-tab-label { display: none; } .s2-tab { justify-content: center; } }

.s2-panel { padding: 24px 24px 26px; animation: bubbleIn 0.35s both; }
.s2-mod-head { display: flex; align-items: flex-start; gap: 13px; margin-bottom: 20px; }
.s2-mod-ico { width: 42px; height: 42px; flex-shrink: 0; border-radius: 12px; display: grid; place-items: center; background: var(--surface-3); color: var(--accent); }
.s2-mod-title { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
.s2-mod-sub { font-size: 13.5px; color: var(--muted); margin-top: 4px; line-height: 1.5; max-width: 56ch; }

.s2-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 560px) { .s2-grid2 { grid-template-columns: 1fr; } }
.s2-field-hint { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted-2); margin-top: 10px; }
.s2-field-hint svg { flex-shrink: 0; }

/* name health grid */
.s2-name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 14px; }
@media (max-width: 560px) { .s2-name-grid { grid-template-columns: 1fr; } }
.s2-name-row { display: flex; flex-direction: column; gap: 7px; }
.s2-name-label { font-size: 12.5px; font-weight: 700; color: var(--muted); }

/* select */
.s2-select { position: relative; }
.s2-select select { width: 100%; padding: 14px 38px 14px 16px; border-radius: 12px; background: var(--bg-1); border: 1.5px solid var(--border); color: var(--text); font-size: 15px; appearance: none; cursor: pointer; transition: border 0.2s, box-shadow 0.2s; }
.s2-select select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(110,168,255,0.12); }
.s2-select-caret { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); color: var(--muted-2); pointer-events: none; display: grid; place-items: center; }
.s2-readonly { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding: 13px 16px; border-radius: 12px; background: var(--bg-1); border: 1px solid var(--border); font-size: 14px; }
.s2-readonly span { color: var(--muted-2); }
.s2-readonly b { font-weight: 700; }
input[type="date"], input[type="datetime-local"] { color-scheme: dark; }

/* result block */
.s2-result { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
.s2-result-head { display: flex; align-items: center; gap: 9px; font-size: 15px; margin-bottom: 14px; }
.s2-result-head.ok { color: var(--mint); }
.s2-result-head.warn { color: var(--gold); }

.s2-issue-list { display: flex; flex-direction: column; gap: 9px; }
.s2-issue { display: flex; align-items: center; gap: 12px; padding: 13px 15px; border-radius: 13px; background: var(--bg-1); border: 1px solid var(--border); }
.s2-issue-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--muted-2); }
.s2-issue.tone-ok .s2-issue-dot { background: var(--mint); box-shadow: 0 0 8px rgba(79,214,192,0.6); }
.s2-issue.tone-warn .s2-issue-dot { background: var(--gold); box-shadow: 0 0 8px rgba(255,206,110,0.6); }
.s2-issue.tone-bad .s2-issue-dot { background: var(--pink); box-shadow: 0 0 8px rgba(255,111,156,0.6); }
.s2-issue.tone-warn { border-color: rgba(255,206,110,0.28); }
.s2-issue.tone-bad { border-color: rgba(255,111,156,0.3); }
.s2-issue-main { flex: 1; min-width: 0; }
.s2-issue-top { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
.s2-issue-top b { font-size: 13.5px; font-weight: 700; }
.s2-issue-val { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12.5px; color: var(--muted); background: var(--surface-2); padding: 2px 8px; border-radius: 6px; letter-spacing: 0.02em; }
.s2-status-pill { font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 100px; letter-spacing: 0.01em; }
.s2-status-pill.tone-ok { background: rgba(79,214,192,0.15); color: var(--mint); }
.s2-status-pill.tone-warn { background: rgba(255,206,110,0.15); color: var(--gold); }
.s2-status-pill.tone-bad { background: rgba(255,111,156,0.15); color: var(--pink); }
.s2-status-pill.tone-muted { background: var(--surface-2); color: var(--muted-2); }
.s2-issue-fix { font-size: 12.5px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
.s2-link { display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0; font-size: 12.5px; font-weight: 700; color: var(--accent); padding: 8px 12px; border-radius: 10px; background: rgba(110,168,255,0.1); border: 1px solid rgba(110,168,255,0.22); transition: all 0.2s; align-self: center; }
.s2-link:hover { background: rgba(110,168,255,0.18); }

/* notes / callouts */
.s2-note { display: flex; gap: 10px; align-items: flex-start; margin-top: 14px; padding: 13px 15px; border-radius: 12px; font-size: 12.5px; line-height: 1.55; color: var(--muted); background: rgba(110,168,255,0.06); border: 1px solid var(--border); }
.s2-note svg { flex-shrink: 0; margin-top: 1px; color: var(--accent); }
.s2-note.warn { background: rgba(255,206,110,0.07); border-color: rgba(255,206,110,0.22); }
.s2-note.warn svg { color: var(--gold); }
.s2-note.ok { background: rgba(79,214,192,0.08); border-color: rgba(79,214,192,0.22); color: #bdeee3; }
.s2-note.ok svg { color: var(--mint); }

/* passport result */
.s2-pp-status { display: flex; align-items: center; gap: 14px; padding: 16px 18px; border-radius: 14px; background: var(--bg-1); border: 1.5px solid var(--border); }
.s2-pp-status.tone-ok { border-color: rgba(79,214,192,0.3); }
.s2-pp-status.tone-warn { border-color: rgba(255,206,110,0.3); }
.s2-pp-status.tone-bad { border-color: rgba(255,111,156,0.32); }
.s2-pp-ico { width: 44px; height: 44px; flex-shrink: 0; border-radius: 12px; display: grid; place-items: center; color: #06122e; }
.s2-pp-status.tone-ok .s2-pp-ico { background: linear-gradient(135deg, var(--mint), #3fb89f); }
.s2-pp-status.tone-warn .s2-pp-ico { background: linear-gradient(135deg, var(--gold), #e9a93f); }
.s2-pp-status.tone-bad .s2-pp-ico { background: linear-gradient(135deg, var(--pink), #e0507f); }
.s2-pp-status b { font-size: 15.5px; font-weight: 800; display: block; }
.s2-pp-months { font-size: 12.5px; color: var(--muted); margin-top: 3px; display: block; }
.s2-pp-months em { font-style: normal; font-weight: 800; color: var(--text); font-size: 14px; }

.s2-guide { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
@media (max-width: 600px) { .s2-guide { grid-template-columns: 1fr; } }
.s2-guide-card { padding: 15px 16px; border-radius: 13px; background: var(--surface); border: 1px solid var(--border); }
.s2-guide-t { display: flex; align-items: center; gap: 8px; font-size: 13.5px; font-weight: 800; margin-bottom: 8px; }
.s2-guide-t svg { color: var(--accent); flex-shrink: 0; }
.s2-guide-card p { font-size: 12.5px; color: var(--muted); line-height: 1.6; }

/* payment flags + alternatives */
.s2-pay-flags { display: flex; flex-direction: column; gap: 11px; }
.s2-flag { display: flex; gap: 12px; padding: 14px 16px; border-radius: 13px; background: var(--bg-1); border: 1.5px solid var(--border); }
.s2-flag.ok { border-color: rgba(79,214,192,0.28); }
.s2-flag.warn { border-color: rgba(255,206,110,0.26); }
.s2-flag.bad { border-color: rgba(255,111,156,0.3); }
.s2-flag-ico { width: 34px; height: 34px; flex-shrink: 0; border-radius: 10px; display: grid; place-items: center; background: var(--surface-3); color: var(--accent); }
.s2-flag.ok .s2-flag-ico { color: var(--mint); }
.s2-flag.warn .s2-flag-ico { color: var(--gold); }
.s2-flag.bad .s2-flag-ico { color: var(--pink); }
.s2-flag b { font-size: 14px; font-weight: 800; }
.s2-flag p { font-size: 12.5px; color: var(--muted); margin-top: 4px; line-height: 1.55; }
.s2-alt { margin-top: 16px; padding: 16px; border-radius: 14px; background: rgba(110,168,255,0.06); border: 1px dashed var(--border-strong); }
.s2-alt-t { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 800; color: var(--accent-2); margin-bottom: 12px; }
.s2-alt-list { display: flex; flex-direction: column; gap: 9px; }
.s2-alt-item { display: flex; align-items: flex-start; gap: 11px; font-size: 13.5px; color: #d6deff; line-height: 1.45; }
.s2-alt-num { width: 22px; height: 22px; flex-shrink: 0; border-radius: 7px; display: grid; place-items: center; font-size: 12px; font-weight: 800; background: var(--surface-3); color: var(--accent); }

/* alerts */
.s2-openlocal { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 16px; padding: 13px 16px; border-radius: 12px; background: var(--surface-3); border: 1px solid var(--border-strong); }
.s2-openlocal span { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--muted); }
.s2-openlocal span svg { color: var(--accent); }
.s2-openlocal b { font-size: 14px; font-weight: 800; font-variant-numeric: tabular-nums; }
.s2-when-label { font-size: 13px; font-weight: 700; color: var(--muted); margin: 20px 0 11px; }
.s2-toggles { display: flex; flex-direction: column; gap: 9px; }
.s2-toggle-row { display: flex; align-items: center; gap: 12px; width: 100%; padding: 13px 16px; border-radius: 12px; background: var(--bg-1); border: 1.5px solid var(--border); transition: all 0.2s; text-align: left; }
.s2-toggle-row.on { border-color: rgba(110,168,255,0.3); background: var(--surface); }
.s2-tg-label { font-size: 14px; font-weight: 700; flex-shrink: 0; }
.s2-tg-time { margin-left: auto; font-size: 12.5px; color: var(--muted); font-variant-numeric: tabular-nums; }
.s2-switch { width: 42px; height: 24px; border-radius: 100px; background: var(--surface-3); border: 1px solid var(--border); flex-shrink: 0; position: relative; transition: all 0.25s; margin-left: 4px; }
.s2-toggle-row.on .s2-switch { background: var(--accent); border-color: transparent; }
.s2-switch i { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: transform 0.25s cubic-bezier(0.2,0.9,0.3,1.2); box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
.s2-toggle-row.on .s2-switch i { transform: translateX(18px); }
.s2-toggle-row:not(.on) .s2-tg-time { display: none; }

/* footer checklist */
.s2-foot { display: flex; align-items: center; gap: 18px; margin-top: 22px; flex-wrap: wrap; }
.s2-checklist { flex: 1; min-width: 260px; display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-radius: 14px; background: var(--surface); border: 1px solid var(--border); flex-wrap: wrap; }
.s2-cl-label { font-size: 12px; font-weight: 800; letter-spacing: 0.04em; color: var(--muted); text-transform: uppercase; }
.s2-cl-items { display: flex; gap: 7px; flex-wrap: wrap; flex: 1; }
.s2-cl-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 700; padding: 5px 10px; border-radius: 100px; background: var(--bg-1); border: 1px solid var(--border); color: var(--muted-2); transition: all 0.25s; }
.s2-cl-chip svg { color: var(--muted-2); }
.s2-cl-chip.done { background: rgba(79,214,192,0.12); border-color: rgba(79,214,192,0.28); color: var(--mint); }
.s2-cl-chip.done svg { color: var(--mint); }
.s2-cl-count { font-size: 13px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; }

/* =================== STEP 3 · FAN CLUB =================== */
.fc-layout { display: grid; grid-template-columns: 320px 1fr; gap: 26px; align-items: start; }
@media (max-width: 760px) { .fc-layout { grid-template-columns: 1fr; } }
.fc-card { aspect-ratio: 1.586; border-radius: 18px; padding: 22px; color: #fff; position: relative; overflow: hidden; box-shadow: var(--shadow); transition: transform 0.6s; display: flex; flex-direction: column; }
.fc-card::after { content: ""; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent 40%), radial-gradient(circle at 80% 120%, rgba(7,11,28,0.5), transparent 60%); }
.fc-card.flip { transform: rotateY(180deg); }
.fc-card.active { box-shadow: 0 0 0 3px rgba(110,168,255,0.3), var(--shadow); }
.fc-card-top { display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
.fc-crown { width: 32px; height: 32px; border-radius: 9px; display: grid; place-items: center; background: rgba(255,255,255,0.22); }
.fc-tier { font-size: 10px; font-weight: 800; letter-spacing: 0.12em; opacity: 0.9; }
.fc-artist { position: relative; z-index: 1; margin-top: auto; font-size: 28px; font-weight: 800; letter-spacing: -0.02em; text-shadow: 0 2px 12px rgba(0,0,0,0.3); }
.fc-club { position: relative; z-index: 1; font-size: 11px; font-weight: 700; letter-spacing: 0.14em; opacity: 0.85; margin-top: 2px; }
.fc-card-foot { position: relative; z-index: 1; margin-top: 16px; display: flex; align-items: baseline; gap: 6px; }
.fc-price { font-size: 22px; font-weight: 800; }
.fc-per { font-size: 12px; opacity: 0.8; }
.fc-memno { font-size: 11px; opacity: 0.8; margin-right: 4px; align-self: center; }
.fc-card-foot b { font-size: 15px; font-weight: 700; letter-spacing: 0.03em; }
.fc-active-stamp { position: absolute; top: 16px; right: 16px; z-index: 2; display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 800; background: rgba(7,11,28,0.45); padding: 6px 10px; border-radius: 100px; backdrop-filter: blur(6px); animation: pop 0.4s both; }
.fc-benefits { display: flex; flex-direction: column; gap: 11px; }
.fc-benefit { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 13px; font-size: 14.5px; font-weight: 500; animation: slideIn 0.5s both; }
@keyframes slideIn { from { opacity: 0; transform: translateX(-12px); } }
.fcb-ico { width: 24px; height: 24px; flex-shrink: 0; border-radius: 50%; display: grid; place-items: center; background: rgba(79,214,192,0.16); color: var(--mint); }

/* =================== STEP 4 · QUEUE =================== */
.queue-wrap { max-width: 560px; margin: 0 auto; }
.queue-panel { padding: 36px 32px 30px; text-align: center; }
.queue-ring { position: relative; width: 200px; height: 200px; margin: 0 auto 8px; }
.qr-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.qr-bg { fill: none; stroke: var(--surface-3); stroke-width: 7; }
.qr-fg { fill: none; stroke: url(#qgrad); stroke: var(--accent); stroke-width: 7; stroke-linecap: round; stroke-dasharray: 327; transition: stroke-dashoffset 0.2s linear; filter: drop-shadow(0 0 6px var(--glow)); }
.queue-num-wrap { position: absolute; inset: 0; display: grid; place-content: center; gap: 2px; }
.queue-num { font-size: 40px; font-weight: 800; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
.queue-num-label { font-size: 12px; color: var(--muted); }
.queue-stats { display: flex; gap: 12px; margin: 22px 0 18px; }
.qstat { flex: 1; padding: 14px; border-radius: 13px; background: var(--bg-1); border: 1px solid var(--border); }
.qstat-label { display: block; font-size: 12px; color: var(--muted-2); margin-bottom: 5px; }
.qstat-val { font-size: 19px; font-weight: 800; font-variant-numeric: tabular-nums; }
.qstat-val.accent { color: var(--accent); }
.queue-bar { height: 7px; border-radius: 100px; background: var(--surface-3); overflow: hidden; }
.queue-bar i { display: block; height: 100%; background: linear-gradient(90deg, var(--accent-deep), var(--accent)); border-radius: 100px; transition: width 0.2s linear; box-shadow: 0 0 10px var(--glow); }
.queue-holding { margin-top: 18px; display: inline-flex; align-items: center; gap: 9px; font-size: 13px; color: var(--muted); }
.dot-spin { width: 14px; height: 14px; border-radius: 50%; border: 2px solid currentColor; border-top-color: transparent; display: inline-block; animation: spin 0.8s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
/* your turn */
.queue-turn { text-align: center; padding: 40px 20px; position: relative; }
.turn-burst { position: absolute; left: 50%; top: 40px; width: 180px; height: 180px; transform: translateX(-50%); border-radius: 50%; background: radial-gradient(circle, var(--glow), transparent 60%); animation: burst 1.2s ease-out infinite; }
@keyframes burst { 0% { transform: translateX(-50%) scale(0.6); opacity: 0.7; } 100% { transform: translateX(-50%) scale(1.5); opacity: 0; } }
.turn-emoji { font-size: 64px; position: relative; animation: pop 0.6s cubic-bezier(0.2,1.5,0.4,1) both; }
.turn-title { font-size: 34px; font-weight: 800; letter-spacing: -0.03em; margin-top: 10px; position: relative; }
.turn-sub { color: var(--muted); margin: 10px 0 26px; font-size: 16px; position: relative; }

/* =================== STEP 5 · SEATS =================== */
.seat-layout { display: grid; grid-template-columns: 1fr 280px; gap: 18px; align-items: start; }
@media (max-width: 880px) { .seat-layout { grid-template-columns: 1fr; } }
.seatmap { padding: 22px; }
.stage-bar { text-align: center; font-size: 12px; font-weight: 800; letter-spacing: 0.4em; color: var(--bg-0); padding: 9px; border-radius: 8px; margin-bottom: 6px; background: linear-gradient(180deg, #cdd9f5, #8aa0d6); box-shadow: 0 8px 24px -10px rgba(110,168,255,0.5); }
.seat-rows { display: flex; flex-direction: column; gap: 7px; margin-top: 20px; max-height: 360px; overflow-y: auto; padding-right: 4px; }
.seat-row { display: flex; align-items: center; gap: 10px; }
.row-label { width: 16px; font-size: 11px; font-weight: 700; color: var(--muted-2); flex-shrink: 0; }

/* ===========================================================
   TickeMate AI — STEP 2 · Account readiness checklist
   1) Cross-platform name health check
   2) Passport validity tracker
   3) Payment method pre-check
   4) Concert info + timezone-aware alerts

function s2NormSpace(s) {
  return (s || "").replace(/\u3000/g, " ").replace(/\s+/g, " ").trim();
}
function s2SpaceIssue(s) {
  s = s || "";

  });

  const refNorm = s2NormSpace(names[refPlat.key]);
  const rows = PLATFORMS.map(p => {
    const raw = names[p.key] || "";
    if (!raw.trim()) return {
      key: p.key,
      status: "empty"

    const nrm = s2NormSpace(raw);
    const isRef = p.key === refPlat.key;
    if (s2SortedKey(raw) !== majKey) return {

      status: "name",
      raw

    if (nrm === refNorm) return {
      key: p.key,
      status: s2SpaceIssue(raw) ? "space" : "ok",

      ref: isRef

    if (nrm.toLowerCase() === refNorm.toLowerCase()) return {

      raw

      status: "order",
      raw
